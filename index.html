<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Terreno 2D Destructible - Fractal Box2D</title>
<script src="https://cdn.jsdelivr.net/npm/planck@latest/dist/planck.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; background: #0e1620; overflow: hidden; font-family: sans-serif; }
  #ui { position: fixed; top: 8px; left: 8px; color: #cfe8ff; font-size: 13px; background: #0009; padding: 8px 12px; border-radius: 8px; line-height: 1.5; max-width: 70vw; user-select: none; }
  #ui b { color: #fff; }
  button { margin-top: 4px; background: #274; color: #fff; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
  button:hover { background: #385; }
  #zoomctl { position: fixed; bottom: 16px; right: 16px; display: flex; flex-direction: column; gap: 8px; }
  #zoomctl button { width: 44px; height: 44px; font-size: 22px; border-radius: 50%; margin: 0; background: #1b2733cc; border: 1px solid #3a5; }
  canvas { display: block; cursor: crosshair; touch-action: none; }
</style>
</head>
<body>
<div id="ui">
  <b>Terreno destructible fractal</b><br>
  <b>WASD</b>: mover / saltar / caída rápida<br>
  Mouse: apuntar · Click: disparar · Pellizcar / rueda: zoom<br>
  Cámara sigue al personaje<br>
  Nodos vivos: <span id="stat-intact">0</span> · Partículas libres: <span id="stat-free">0</span><br>
  <button id="reset">Reset</button>
</div>
<div id="zoomctl">
  <button id="zoomin">+</button>
  <button id="zoomout">−</button>
</div>
<canvas id="c"></canvas>

<script>
const pl = planck;
const Vec2 = pl.Vec2;

// ---------- Config ----------
const W = window.innerWidth, H = window.innerHeight;
const ZOOM = 4;
const PTM = 10;
const P_D = 5;
const LEVEL_SIZE = [P_D, P_D*2, P_D*4, P_D*8, P_D*16]; // 5,10,20,40,80
const TOP_LEVEL = LEVEL_SIZE.length - 1;
const px2m = px => px / PTM;
const m2px = m => m * PTM;

const BIG_N = 4;
const bigSize = BIG_N * LEVEL_SIZE[TOP_LEVEL];

const PHYS_W = bigSize * 3, PHYS_H = bigSize * 3;
const originX = (PHYS_W - bigSize) / 2;
const terrainTop = PHYS_H * 0.22;

const CHAR_SIZE = P_D * 1.4;
const WALK_SPEED = px2m(120);
const JUMP_IMPULSE = px2m(48);
const FAST_FALL_IMPULSE = px2m(8);
const BULLET_SPEED = px2m(520);
const BULLET_RADIUS = P_D * 0.28;
const BULLET_SPAWN_GAP = CHAR_SIZE * 0.85;
const BULLET_MAX_LIFE = 2.5;
const BULLET_MAX_DIST = 400;
const NO_CHAR_BULLET = -1; // same negative groupIndex → no collide

const canvas = document.getElementById('c');
canvas.width = W; canvas.height = H;
const ctx = canvas.getContext('2d');

// ---------- Camara ----------
const MIN_ZOOM = 0.15, MAX_ZOOM = 12;
const camera = {
  cx: originX + bigSize/2,
  cy: terrainTop - 40,
  zoom: Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, (Math.min(W,H)*0.92) / (bigSize*ZOOM)))
};
function viewScale(){ return ZOOM * camera.zoom; }
function screenToPhys(sx, sy){
  const vs = viewScale();
  return { x: camera.cx + (sx - W/2)/vs, y: camera.cy + (sy - H/2)/vs };
}
function clampZoom(z){ return Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, z)); }
function setZoom(factor){
  camera.zoom = clampZoom(camera.zoom * factor);
}

// ---------- Mundo físico ----------
const world = new pl.World(Vec2(0, 22));

function addWall(x,y,w,h){
  const b = world.createBody({type:'static', position:Vec2(px2m(x),px2m(y))});
  b.setUserData({ kind: 'wall' });
  b.createFixture(pl.Box(px2m(w/2), px2m(h/2)), {friction:0.6});
}
addWall(PHYS_W/2, PHYS_H+10, PHYS_W+40, 20);   // piso
addWall(-10, PHYS_H/2, 20, PHYS_H+40);          // pared izq
addWall(PHYS_W+10, PHYS_H/2, 20, PHYS_H+40);   // pared der

// ---------- Estructura fractal ----------
const intact = new Map();
const freeParticles = [];
const bullets = [];
const toDestroy = new Set();
const pendingHits = []; // { type:'break'|'particle', ... } — apply after step

function randomImpulsePx(minPx, maxPx){
  const ang = Math.random()*Math.PI*2;
  const mag = minPx + Math.random()*(maxPx-minPx);
  return Vec2(Math.cos(ang), Math.sin(ang)).mul(px2m(mag));
}
function kick(body, minPx, maxPx){
  body.applyLinearImpulse(randomImpulsePx(minPx,maxPx), body.getPosition(), true);
}

const LEVEL_COLOR = ['#caa26a', '#8a6d43', '#5f5240', '#3d3a33', '#242220'];

function nodeKey(level,gx,gy){ return level+'_'+gx+'_'+gy; }

function createIntactNode(level, gx, gy){
  const size = LEVEL_SIZE[level];
  const x = originX + gx*size;
  const y = terrainTop + gy*size;
  const body = world.createBody({type:'static', position:Vec2(px2m(x+size/2), px2m(y+size/2))});
  body.createFixture(pl.Box(px2m(size/2), px2m(size/2)), {friction:0.9});
  const node = {level, gx, gy, x, y, size, body};
  body.setUserData({ kind: 'intact', node });
  intact.set(nodeKey(level,gx,gy), node);
  return node;
}

function initWorldGrid(){
  for(let gx=0; gx<BIG_N; gx++){
    for(let gy=0; gy<BIG_N; gy++){
      createIntactNode(TOP_LEVEL, gx, gy);
    }
  }
}

function shatterToParticles(node){
  const s = LEVEL_SIZE[0];
  const centers = [
    Vec2(node.x + s*0.5, node.y + s*0.5),
    Vec2(node.x + s*1.5, node.y + s*0.5),
    Vec2(node.x + s*0.5, node.y + s*1.5),
    Vec2(node.x + s*1.5, node.y + s*1.5),
  ];
  const bodies = centers.map(c=>{
    const b = world.createBody({
      type:'dynamic',
      position: Vec2(px2m(c.x), px2m(c.y)),
      linearDamping:0.4, angularDamping:0.6
    });
    b.createFixture(pl.Circle(px2m(P_D/2)), {density:1.2, friction:0.6, restitution:0.05});
    b.setUserData({ kind: 'particle' });
    freeParticles.push(b);
    return b;
  });

  bodies.forEach(b => kick(b, 25, 70));
}

function breakNode(node, ix, iy){
  if(!intact.has(nodeKey(node.level, node.gx, node.gy))) return;
  world.destroyBody(node.body);
  intact.delete(nodeKey(node.level, node.gx, node.gy));

  if(node.level === 1){
    shatterToParticles(node);
    return;
  }

  const childLevel = node.level - 1;
  let impactChild = null;
  for(let dx=0; dx<2; dx++){
    for(let dy=0; dy<2; dy++){
      const child = createIntactNode(childLevel, node.gx*2+dx, node.gy*2+dy);
      if(ix!==undefined && ix>=child.x && ix<child.x+child.size && iy>=child.y && iy<child.y+child.size){
        impactChild = child;
      }
    }
  }
  if(impactChild) breakNode(impactChild, ix, iy);
}

function deleteParticle(body){
  const idx = freeParticles.indexOf(body);
  if(idx<0) return;
  world.destroyBody(body);
  freeParticles.splice(idx,1);
}

function queueDestroy(body){
  if(body) toDestroy.add(body);
}

function flushHits(){
  for(const hit of pendingHits){
    if(hit.type === 'break' && hit.node) breakNode(hit.node, hit.ix, hit.iy);
    else if(hit.type === 'particle' && hit.body) deleteParticle(hit.body);
  }
  pendingHits.length = 0;
}

function flushDestroy(){
  for(const body of toDestroy){
    const data = body.getUserData();
    if(data && data.kind === 'bullet'){
      const i = bullets.indexOf(body);
      if(i>=0) bullets.splice(i,1);
    } else if(data && data.kind === 'particle'){
      const i = freeParticles.indexOf(body);
      if(i>=0) freeParticles.splice(i,1);
    }
    try { world.destroyBody(body); } catch(_){}
  }
  toDestroy.clear();
}

// ---------- Personaje ----------
let character = null;
let grounded = false;
let groundContacts = 0;
const keys = Object.create(null);
let mouseSX = W/2, mouseSY = H/2;

function spawnCharacter(){
  if(character){
    world.destroyBody(character);
    character = null;
  }
  groundContacts = 0;
  grounded = false;
  const x = originX + bigSize/2;
  const y = terrainTop - CHAR_SIZE * 3;
  character = world.createBody({
    type: 'dynamic',
    position: Vec2(px2m(x), px2m(y)),
    fixedRotation: true,
    allowSleep: false
  });
  character.setUserData({ kind: 'character' });
  character.createFixture(pl.Box(px2m(CHAR_SIZE/2), px2m(CHAR_SIZE/2)), {
    density: 1.5,
    friction: 0.4,
    restitution: 0,
    filterGroupIndex: NO_CHAR_BULLET
  });
}

function aimAngle(){
  if(!character) return 0;
  const p = character.getPosition();
  const cx = m2px(p.x), cy = m2px(p.y);
  const vs = viewScale();
  const sx = W/2 + (cx - camera.cx) * vs;
  const sy = H/2 + (cy - camera.cy) * vs;
  return Math.atan2(mouseSY - sy, mouseSX - sx);
}

function fireBullet(){
  if(!character) return;
  const ang = aimAngle();
  const p = character.getPosition();
  const ox = Math.cos(ang) * px2m(BULLET_SPAWN_GAP);
  const oy = Math.sin(ang) * px2m(BULLET_SPAWN_GAP);
  const body = world.createBody({
    type: 'dynamic',
    position: Vec2(p.x + ox, p.y + oy),
    bullet: true,
    fixedRotation: true,
    gravityScale: 0
  });
  body.setUserData({
    kind: 'bullet',
    born: performance.now() / 1000,
    ox: m2px(p.x + ox),
    oy: m2px(p.y + oy)
  });
  body.createFixture(pl.Circle(px2m(BULLET_RADIUS)), {
    density: 0.2,
    friction: 0,
    restitution: 0,
    filterGroupIndex: NO_CHAR_BULLET
  });
  body.setLinearVelocity(Vec2(Math.cos(ang) * BULLET_SPEED, Math.sin(ang) * BULLET_SPEED));
  bullets.push(body);
}

function updateCharacter(){
  if(!character) return;
  grounded = groundContacts > 0;
  const v = character.getLinearVelocity();
  let vx = 0;
  if(keys.KeyA) vx -= WALK_SPEED;
  if(keys.KeyD) vx += WALK_SPEED;
  character.setLinearVelocity(Vec2(vx, v.y));

  if(keys.KeyW && grounded){
    character.applyLinearImpulse(Vec2(0, -JUMP_IMPULSE), character.getPosition(), true);
    grounded = false;
  }
  // Assumption: S = fast-fall (down impulse), no crouch hitbox
  if(keys.KeyS){
    character.applyLinearImpulse(Vec2(0, FAST_FALL_IMPULSE), character.getPosition(), true);
  }
}

function followCamera(){
  if(!character) return;
  const p = character.getPosition();
  camera.cx = m2px(p.x);
  camera.cy = m2px(p.y);
}

function updateBullets(dt){
  const now = performance.now() / 1000;
  for(const b of [...bullets]){
    const data = b.getUserData();
    if(!data) continue;
    const p = b.getPosition();
    const px = m2px(p.x), py = m2px(p.y);
    if(now - data.born > BULLET_MAX_LIFE || Math.hypot(px - data.ox, py - data.oy) > BULLET_MAX_DIST){
      queueDestroy(b);
    }
  }
}

function kindOf(body){
  const d = body && body.getUserData();
  return d && d.kind;
}

function contactPair(contact){
  const a = contact.getFixtureA().getBody();
  const b = contact.getFixtureB().getBody();
  return [a, b, kindOf(a), kindOf(b)];
}

function onBeginContact(contact){
  const [a, b, ka, kb] = contactPair(contact);

  if(ka === 'character' || kb === 'character'){
    const other = ka === 'character' ? kb : ka;
    if(other === 'wall' || other === 'intact' || other === 'particle') groundContacts++;
  }

  let bullet = null, other = null, otherKind = null;
  if(ka === 'bullet'){ bullet = a; other = b; otherKind = kb; }
  else if(kb === 'bullet'){ bullet = b; other = a; otherKind = ka; }
  if(!bullet) return;

  const wm = contact.getWorldManifold();
  const pt = wm.points[0];
  const ix = pt ? m2px(pt.x) : m2px(bullet.getPosition().x);
  const iy = pt ? m2px(pt.y) : m2px(bullet.getPosition().y);

  if(otherKind === 'intact'){
    const data = other.getUserData();
    if(data && data.node) pendingHits.push({ type:'break', node: data.node, ix, iy });
  } else if(otherKind === 'particle'){
    pendingHits.push({ type:'particle', body: other });
  }
  queueDestroy(bullet);
}

function onEndContact(contact){
  const [a, b, ka, kb] = contactPair(contact);
  if(ka === 'character' || kb === 'character'){
    const other = ka === 'character' ? kb : ka;
    if(other === 'wall' || other === 'intact' || other === 'particle'){
      groundContacts = Math.max(0, groundContacts - 1);
    }
  }
}

world.on('begin-contact', onBeginContact);
world.on('end-contact', onEndContact);

// ---------- Interacción ----------
const pointers = new Map();
let tap = null;
let pinch = null;

function midOf(pts){ return {x:(pts[0].x+pts[1].x)/2, y:(pts[0].y+pts[1].y)/2}; }
function distOf(pts){ return Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y); }

canvas.addEventListener('pointerdown', e=>{
  canvas.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
  mouseSX = e.clientX; mouseSY = e.clientY;

  if(pointers.size === 1){
    tap = {id:e.pointerId, startX:e.clientX, startY:e.clientY, moved:false};
    pinch = null;
  } else if(pointers.size === 2){
    tap = null;
    const pts = [...pointers.values()];
    pinch = { dist: distOf(pts), zoom0: camera.zoom };
  }
});

canvas.addEventListener('pointermove', e=>{
  mouseSX = e.clientX; mouseSY = e.clientY;
  if(!pointers.has(e.pointerId)) return;
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});

  if(pointers.size === 2 && pinch){
    const pts = [...pointers.values()];
    const d = distOf(pts);
    camera.zoom = clampZoom(pinch.zoom0 * (d / pinch.dist));
    return;
  }

  if(pointers.size === 1 && tap && tap.id===e.pointerId){
    const dx = e.clientX - tap.startX, dy = e.clientY - tap.startY;
    if(!tap.moved && Math.hypot(dx,dy) > 8) tap.moved = true;
  }
});

window.addEventListener('pointermove', e=>{
  mouseSX = e.clientX; mouseSY = e.clientY;
});

function endPointer(e){
  const wasTap = tap && tap.id===e.pointerId && !tap.moved;
  pointers.delete(e.pointerId);
  if(wasTap) fireBullet();
  if(pointers.size < 2) pinch = null;
  if(pointers.size === 0) tap = null;
}
canvas.addEventListener('pointerup', endPointer);
canvas.addEventListener('pointercancel', endPointer);

canvas.addEventListener('wheel', e=>{
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.15 : 1/1.15;
  setZoom(factor);
}, {passive:false});

window.addEventListener('keydown', e=>{
  keys[e.code] = true;
  if(['KeyW','KeyA','KeyS','KeyD','Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)){
    e.preventDefault();
  }
});
window.addEventListener('keyup', e=>{ keys[e.code] = false; });

document.getElementById('zoomin').addEventListener('click', ()=> setZoom(1.35));
document.getElementById('zoomout').addEventListener('click', ()=> setZoom(1/1.35));

document.getElementById('reset').addEventListener('click', ()=>{
  for(const node of intact.values()) world.destroyBody(node.body);
  intact.clear();
  for(const b of freeParticles) world.destroyBody(b);
  freeParticles.length = 0;
  for(const b of bullets) world.destroyBody(b);
  bullets.length = 0;
  toDestroy.clear();
  pendingHits.length = 0;
  camera.zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, (Math.min(W,H)*0.92) / (bigSize*ZOOM)));
  initWorldGrid();
  spawnCharacter();
  followCamera();
});

// ---------- Render loop ----------
function draw(){
  ctx.fillStyle = '#0e1620';
  ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.scale(viewScale(), viewScale());
  ctx.translate(-camera.cx, -camera.cy);

  // Nodos intactos
  for(const node of intact.values()){
    ctx.fillStyle = LEVEL_COLOR[node.level];
    ctx.fillRect(node.x, node.y, node.size, node.size);
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth = 1/viewScale();
    ctx.strokeRect(node.x, node.y, node.size, node.size);
  }

  // Partículas libres
  ctx.fillStyle = '#e0b26a';
  for(const b of freeParticles){
    const p = b.getPosition();
    ctx.beginPath();
    ctx.arc(m2px(p.x), m2px(p.y), P_D/2, 0, Math.PI*2);
    ctx.fill();
  }

  // Balas
  ctx.fillStyle = '#ffd36a';
  for(const b of bullets){
    const p = b.getPosition();
    ctx.beginPath();
    ctx.arc(m2px(p.x), m2px(p.y), BULLET_RADIUS, 0, Math.PI*2);
    ctx.fill();
  }

  // Personaje + mira
  if(character){
    const p = character.getPosition();
    const cx = m2px(p.x), cy = m2px(p.y);
    ctx.fillStyle = '#6ec8ff';
    ctx.fillRect(cx - CHAR_SIZE/2, cy - CHAR_SIZE/2, CHAR_SIZE, CHAR_SIZE);
    ctx.strokeStyle = '#dff6ff';
    ctx.lineWidth = 1.5/viewScale();
    ctx.strokeRect(cx - CHAR_SIZE/2, cy - CHAR_SIZE/2, CHAR_SIZE, CHAR_SIZE);

    const ang = aimAngle();
    const len = CHAR_SIZE * 1.6;
    ctx.strokeStyle = '#ff8a5c';
    ctx.lineWidth = 2/viewScale();
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(ang)*len, cy + Math.sin(ang)*len);
    ctx.stroke();
  }

  ctx.restore();

  document.getElementById('stat-intact').textContent = intact.size;
  document.getElementById('stat-free').textContent = freeParticles.length;
}

let lastT = performance.now();
function loop(t){
  const dt = Math.min(0.05, (t - lastT) / 1000);
  lastT = t;
  updateCharacter();
  world.step(1/60, 8, 3);
  flushHits();
  flushDestroy();
  updateBullets(dt);
  followCamera();
  draw();
  requestAnimationFrame(loop);
}

initWorldGrid();
spawnCharacter();
followCamera();
requestAnimationFrame(loop);
</script>
</body>
</html>
